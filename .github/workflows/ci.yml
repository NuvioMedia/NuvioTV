name: CI

on:
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - 'README.md'
      - 'assets/**'
  push:
    branches: [dev, main]
    paths-ignore:
      - 'README.md'
      - 'assets/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate local.properties
        shell: bash
        run: |
          cat > local.properties <<EOF
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          PARENTAL_GUIDE_API_URL=${PARENTAL_GUIDE_API_URL}
          INTRODB_API_URL=${INTRODB_API_URL}
          TRAILER_API_URL=${TRAILER_API_URL}
          IMDB_RATINGS_API_BASE_URL=${IMDB_RATINGS_API_BASE_URL}
          IMDB_TAPFRAME_API_BASE_URL=${IMDB_TAPFRAME_API_BASE_URL}
          TRAKT_CLIENT_ID=${TRAKT_CLIENT_ID}
          TRAKT_CLIENT_SECRET=${TRAKT_CLIENT_SECRET}
          TRAKT_API_URL=${TRAKT_API_URL:-https://api.trakt.tv/}
          TV_LOGIN_WEB_BASE_URL=${TV_LOGIN_WEB_BASE_URL:-https://app.nuvio.tv/tv-login}
          EOF
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PARENTAL_GUIDE_API_URL: ${{ secrets.PARENTAL_GUIDE_API_URL }}
          INTRODB_API_URL: ${{ secrets.INTRODB_API_URL }}
          TRAILER_API_URL: ${{ secrets.TRAILER_API_URL }}
          IMDB_RATINGS_API_BASE_URL: ${{ secrets.IMDB_RATINGS_API_BASE_URL }}
          IMDB_TAPFRAME_API_BASE_URL: ${{ secrets.IMDB_TAPFRAME_API_BASE_URL }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}
          TRAKT_API_URL: ${{ secrets.TRAKT_API_URL }}
          TV_LOGIN_WEB_BASE_URL: ${{ secrets.TV_LOGIN_WEB_BASE_URL }}

      - name: Lint and unit tests (hard gate)
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest --stacktrace

      - name: Assemble debug (progressive, non-blocking)
        continue-on-error: true
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            app/build/reports/**
            app/build/test-results/**
